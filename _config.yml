# Site settings
title: Ben Tanen
email: ben.tanen@gmail.com
description: "This is the personal website of Ben Tanen. It includes posts written by him and links to other content from Ben."
baseurl: ""
url: "https://ben-tanen.com"
twitter_username: ben_tanen
github_username:  ben-tanen

# Build settings
plugins: []
exclude:
  - Gemfile
  - Gemfile.lock
  - readme.md
  - update-landing-proj-order.py
markdown: kramdown
permalink: /projects/:year/:month/:day/:title.html

# Collections
collections:
  generative-sketches:
    sort_by: date
    output: true
    permalink: /projects/generative-sketchbook/:year/:month/:day/:title.html
  landing-projects:
    sort_by: order

