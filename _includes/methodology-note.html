<div class='methodology'>
    <p class='methodology-title'>Methodology and minutia</p>
    {% assign desc = include.content | newline_to_br | split: '<br />' %}
    {% for member in desc %}
    {% assign trimmed = member | strip %}
    {% if trimmed != '' %}
    <p markdown="1">{{ trimmed }}</p>
    {% endif %}
    {% endfor %}
</div>
